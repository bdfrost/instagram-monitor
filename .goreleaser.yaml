version: 2

project_name: instagram-monitor

builds:
  - id: monitor
    main: ./cmd/monitor
    binary: instagram-monitor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

dockers:
  - image_templates:
      - "ghcr.io/bdfrost/instagram-monitor:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Instagram feed monitor for appointment booking alerts"
      - "--label=org.opencontainers.image.source=https://github.com/bdfrost/instagram-monitor"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--platform=linux/amd64"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=BUILD_DATE={{.Date}}"
    use: buildx
    goos: linux
    goarch: amd64

  - image_templates:
      - "ghcr.io/bdfrost/instagram-monitor:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Instagram feed monitor for appointment booking alerts"
      - "--label=org.opencontainers.image.source=https://github.com/bdfrost/instagram-monitor"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--platform=linux/arm64"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=BUILD_DATE={{.Date}}"
    use: buildx
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/bdfrost/instagram-monitor:{{ .Version }}"
    image_templates:
      - "ghcr.io/bdfrost/instagram-monitor:{{ .Version }}-amd64"
      - "ghcr.io/bdfrost/instagram-monitor:{{ .Version }}-arm64"

  - name_template: "ghcr.io/bdfrost/instagram-monitor:latest"
    image_templates:
      - "ghcr.io/bdfrost/instagram-monitor:{{ .Version }}-amd64"
      - "ghcr.io/bdfrost/instagram-monitor:{{ .Version }}-arm64"

docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"
    artifacts: images
    output: true

sboms:
  - artifacts: source

release:
  github:
    owner: bdfrost
    name: instagram-monitor
  mode: replace
  header: |
    ## 📸 Instagram Monitor {{ .Version }}

    Release for {{ .Date }}.

  footer: |
    **Full Changelog**: https://github.com/bdfrost/instagram-monitor/compare/{{ .PreviousTag }}...{{ .Tag }}

  name_template: "v{{ .Version }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch
