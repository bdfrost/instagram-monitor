{{- if .Values.state.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "instagram-monitor.name" . }}-state
  labels:
    {{- include "instagram-monitor.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- range .Values.state.accessModes }}
    - {{ . }}
    {{- end }}
  storageClassName: {{ .Values.state.storageClass }}
  resources:
    requests:
      storage: {{ .Values.state.size }}
{{- end }}
