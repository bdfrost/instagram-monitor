# Default values for instagram-monitor.

image:
  repository: ghcr.io/bdfrost/instagram-monitor
  pullPolicy: IfNotPresent
  tag: "0.1.3"

schedule: "0 */3 * * *"
concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 1
restartPolicy: Never
activeDeadlineSeconds: 300
backoffLimit: 0

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

state:
  enabled: true
  size: 10Mi
  storageClass: "synology-csi-iscsi-delete"
  accessModes:
    - ReadWriteOnce

httpTimeout: 30
dryRun: false

monitors:
  - username: "example_artist"
    displayName: "Example Tattoo Artist"
    keywords:
      - "book"
      - "booking"
      - "open"
      - "appointment"
      - "slots"
      - "calendar"
    notifyOnAny: false
