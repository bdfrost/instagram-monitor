# SealedSecret for the webhook notification URL
#
# USAGE:
# 1. Fill in the plain Secret template at templates/secret-template.yaml
#    with your actual webhook URL in values.yaml (secret.enabled=true,
#    secret.notificationURL="https://hooks.slack.com/services/...")
#
# 2. Render the secret:
#    helm template instagram-monitor . -n instagram-monitor \
#      -f values.yaml | kubectl apply --dry-run=client -n instagram-monitor -f -
#
# 3. Encrypt with kubeseal:
#    kubectl get secret instagram-monitor-secrets -n instagram-monitor -o yaml \
#      | kubeseal --controller-namespace kube-system --controller-name sealed-secrets \
#        -o yaml > sealedsecret.yaml
#
# 4. Commit sealedsecret.yaml and set secret.enabled=true in values.yaml
#    (the SealedSecret controller will decrypt it into a regular Secret at runtime)
#
# 5. Delete the plain secret from values.yaml and the secret-template.yaml
#    once sealedsecret.yaml is in place
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: instagram-monitor-secrets
  namespace: instagram-monitor
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    NOTIFICATION_URL: <replace-with-encrypted-value>
  template:
    metadata:
      name: instagram-monitor-secrets
      namespace: instagram-monitor
    type: Opaque
